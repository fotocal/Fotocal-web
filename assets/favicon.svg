<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <title>Fotocal</title>
  <!-- The official Fotocal app icon. Embedded as a data URI on purpose:
       an SVG favicon may not fetch external images, and every page in the
       site already points at this one file, so the real logo shows up in
       the browser tab everywhere without touching any page markup. -->
  <image width="96" height="96" href="data:image/png;base64,"/>
</svg>
